<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" role="img" aria-labelledby="title desc">
  <title id="title">Structura Ethica Lumen triad v0.2</title>
  <desc id="desc">Three equally weighted overlapping circles in navy, gold, and deep slate, with parchment separation and explicit labels.</desc>
  <rect width="720" height="560" fill="#FAF8F5"/>

  <!-- Equal parchment separation under each circle prevents visual merger without assigning hierarchy -->
  <g fill="none" stroke="#FAF8F5" stroke-width="26">
    <circle cx="280" cy="225" r="118"/>
    <circle cx="440" cy="225" r="118"/>
    <circle cx="360" cy="355" r="118"/>
  </g>

  <!-- Equal dimensions and equal stroke weights -->
  <g fill="none" stroke-width="18">
    <circle cx="280" cy="225" r="118" stroke="#0D1B2A"/>
    <circle cx="440" cy="225" r="118" stroke="#F0B53F"/>
    <circle cx="360" cy="355" r="118" stroke="#1A1A2E"/>
  </g>

  <path d="M360 76 V108" stroke="#8F6B4D" stroke-width="8" stroke-linecap="round"/>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif"
     font-size="20" font-weight="700" letter-spacing="2" text-anchor="middle">
    <text x="180" y="520" fill="#0D1B2A">STRUCTURA</text>
    <text x="360" y="520" fill="#1A1A2E">ETHICA</text>
    <text x="540" y="520" fill="#F0B53F">LUMEN</text>
  </g>
</svg>
