<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Ethica icon</title>
  <desc id="desc">A restrained two-point compass needle indicating orientation and responsible judgment.</desc>
  <rect width="256" height="256" rx="24" fill="#FAF8F5"/>
  <circle cx="128" cy="128" r="74" fill="none" stroke="#0D1B2A" stroke-width="12"/>

  <!-- Classic two-point needle: gold north, navy south -->
  <path d="M128 64 L144 128 L128 119 L112 128 Z"
        fill="#F0B53F" stroke="#0D1B2A" stroke-width="4" stroke-linejoin="round"/>
  <path d="M128 192 L112 128 L128 137 L144 128 Z"
        fill="#0D1B2A" stroke="#0D1B2A" stroke-width="4" stroke-linejoin="round"/>

  <circle cx="128" cy="128" r="8" fill="#8F6B4D"/>
  <path d="M128 34 V48 M128 208 V222 M34 128 H48 M208 128 H222"
        stroke="#888888" stroke-width="8" stroke-linecap="round"/>
</svg>
